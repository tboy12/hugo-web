{{ define "main" }}
<main id="main">

	<div class="container">

		<div class="row topspace">
			<div class="col-sm-8 col-sm-offset-2">

 				<article class="post">
					<header class="entry-header">
 						<div class="entry-meta">
               <!--<span class="posted-on">
					{{ if not $.IsHome }}
                	  <time class="entry-date published" datetime="{{ .Date.Format .Site.Params.DateForm }}">
                	    {{ .Date.Format "January 2, 2006" }}
                	  </time>
					{{ end }} diabling date showing on pages
               </span>-->
 						</div>
 						<h1 class="entry-title"><a href="{{ .RelPermalink }}" rel="bookmark">{{ .Title }}</a></h1>
					</header>
					<div class="entry-content">
						{{ .Content }}
					</div>
				</article><!-- #post-## -->

			</div>
		</div> <!-- /row post  -->

		<div class="row">
			<div class="col-sm-8 col-sm-offset-2">

				<div id="share">
					{{ if .Params.Share }}
							{{ partial "sharethis.html" . }}
					{{ end }}
				</div>
			</div>
		</div> <!-- /row share -->
		<div class="clearfix"></div>

		<div class="row">
			<div class="col-sm-8 col-sm-offset-2">
				<!--
				<div id="comments">
					{{ if .Params.Comments }}
							{{ partial "disqus.html" . }}
					{{ end }}
				</div>
				-->				
				<div id="comments" class="giscus">
					{{ if .Params.Comments }}
					<script src="https://giscus.app/client.js"
        				data-repo="tboy12/temy-hugo-web"
        				data-repo-id="R_kgDONUsUjg"
        				data-category="General"
        				data-category-id="DIC_kwDONUsUjs4C6UYB"
        				data-mapping="pathname"
        				data-strict="0"
        				data-reactions-enabled="1"
        				data-emit-metadata="0"
        				data-input-position="bottom"
        				data-theme="dark_dimmed"
        				data-lang="en"
        				crossorigin="anonymous"
        				async>
					</script>
					{{ end }}
				</div>
				
			</div>
		</div> <!-- /row comments -->
		<div class="clearfix"></div>

	</div>	<!-- /container -->

</main>
{{ end }}
